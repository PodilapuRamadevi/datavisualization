<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6f9;
      padding: 20px;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .summary-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .summary-card h2 {
      font-size: 28px;
      margin-top: 10px;
      color: #007bff;
    }

    canvas {
      width: 100% !important;
      height: 300px !important;
    }
  </style>
</head>
<body>

  <h1>Sales Data Dashboard</h1>

  <div class="summary">
    <div class="summary-card">
      <h3>Total Revenue</h3>
      <h2>$120K</h2>
    </div>

    <div class="summary-card">
      <h3>Total Orders</h3>
      <h2>4,580</h2>
    </div>

    <div class="summary-card">
      <h3>Customers</h3>
      <h2>1,250</h2>
    </div>

    <div class="summary-card">
      <h3>Growth</h3>
      <h2>18%</h2>
    </div>
  </div>

  <div class="dashboard">

    <div class="card">
      <h3>Monthly Sales</h3>
      <canvas id="barChart"></canvas>
    </div>

    <div class="card">
      <h3>Revenue Trend</h3>
      <canvas id="lineChart"></canvas>
    </div>

    <div class="card">
      <h3>Product Categories</h3>
      <canvas id="pieChart"></canvas>
    </div>

    <div class="card">
      <h3>Regional Sales</h3>
      <canvas id="doughnutChart"></canvas>
    </div>

    <div class="card">
      <h3>Quarterly Performance</h3>
      <canvas id="radarChart"></canvas>
    </div>

  </div>

  <script>

    // Bar Chart
    new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
        datasets: [{
          label: 'Sales',
          data: [12000, 19000, 15000, 22000, 18000, 25000],
          backgroundColor: '#4e73df'
        }]
      }
    });

    // Line Chart
    new Chart(document.getElementById('lineChart'), {
      type: 'line',
      data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
        datasets: [{
          label: 'Revenue',
          data: [10000, 14000, 13000, 18000, 20000, 24000],
          borderColor: '#1cc88a',
          fill: false,
          tension: 0.3
        }]
      }
    });

    // Pie Chart
    new Chart(document.getElementById('pieChart'), {
      type: 'pie',
      data: {
        labels: ['Electronics', 'Fashion', 'Home', 'Sports'],
        datasets: [{
          data: [35, 25, 20, 20],
          backgroundColor: ['#36b9cc', '#f6c23e', '#e74a3b', '#858796']
        }]
      }
    });

    // Doughnut Chart
    new Chart(document.getElementById('doughnutChart'), {
      type: 'doughnut',
      data: {
        labels: ['North', 'South', 'East', 'West'],
        datasets: [{
          data: [30, 25, 20, 25],
          backgroundColor: ['#4e73df', '#1cc88a', '#36b9cc', '#f6c23e']
        }]
      }
    });

    // Radar Chart
    new Chart(document.getElementById('radarChart'), {
      type: 'radar',
      data: {
        labels: ['Q1', 'Q2', 'Q3', 'Q4'],
        datasets: [{
          label: 'Performance',
          data: [65, 78, 85, 90],
          backgroundColor: 'rgba(78,115,223,0.2)',
          borderColor: '#4e73df'
        }]
      }
    });

  </script>

</body>
</html>
